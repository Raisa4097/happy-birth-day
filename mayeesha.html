<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mayeesha Birthday</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
<style>
body{
  margin:0;
  font-family:Poppins, sans-serif;
  background:linear-gradient(120deg,#ff9a9e,#fad0c4);
  overflow:hidden;
}
#wrapper{
  position:relative;
  text-align:center;
  padding-top:120px;
}
h1{
  font-size:3rem;
  color:#ff2e63;
  margin-bottom:20px;
}
button{
  padding:12px 25px;
  border:none;
  border-radius:25px;
  background:#ff2e63;
  color:white;
  font-size:18px;
  cursor:pointer;
  margin-top:10px;
}
.gifts{
  display:flex;
  justify-content:center;
  gap:20px;
  margin-top:30px;
}
.gift{
  width:120px;
  height:120px;
  background:white;
  border-radius:15px;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:50px;
  cursor:pointer;
  box-shadow:0 10px 20px rgba(0,0,0,0.2);
}
#popup{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.7);
  justify-content:center;
  align-items:center;
  z-index:10;
}
.content{
  background:white;
  border-radius:20px;
  padding:25px;
  max-width:400px;
  width:90%;
  text-align:center;
}
#floatingText{
  font-size:3rem;
  font-weight:bold;
  font-style:italic;
  color:#ff2e63;
  text-shadow: 0 0 10px #ff2e63, 0 0 20px #ff4d6d;
  display:flex; flex-wrap:wrap; justify-content:center; gap:5px;
  position:fixed; top:20px; width:100%; z-index:5;
  pointer-events:none;
}

/* Letters animation */
.letter{
  display:inline-block;
  opacity:0;
  transform:translateY(-50px) rotate(-10deg);
  animation: floatIn 0.6s forwards;
}
@keyframes floatIn {
  0% { opacity:0; transform:translateY(-50px) rotate(-10deg) scale(0.5);}
  60% { opacity:1; transform:translateY(10px) rotate(5deg) scale(1.1);}
  100% { opacity:1; transform:translateY(0) rotate(0deg) scale(1);}
}

/* Floating hearts */
.heart{
  position:fixed;
  bottom:-50px;
  font-size:24px;
  color:#ff4d6d;
  pointer-events:none;
  z-index:0;
  animation:float 6s linear infinite;
}
@keyframes float{
  to{transform:translateY(-110vh); opacity:0;}
}

/* Floating emoji balloons */
.emojiBalloon{
  position:fixed;
  font-size:2rem;
  bottom:-60px;
  animation:floatEmoji 6s linear infinite;
  z-index:0;
}
@keyframes floatEmoji{
  0% { transform:translateY(0) rotate(0deg); opacity:1;}
  100% { transform:translateY(-110vh) rotate(360deg); opacity:0;}
}

/* Sparkles */
.sparkle{
  position:fixed;
  width:6px;
  height:6px;
  border-radius:50%;
  background:yellow;
  opacity:0.8;
  z-index:0;
  animation:sparkleAnim 2s linear infinite;
}
@keyframes sparkleAnim{
  0% {transform:translateY(0) scale(0.5); opacity:1;}
  100% {transform:translateY(-120vh) scale(1); opacity:0;}
}

/* Confetti */
.confetti-piece{
  position:fixed;
  width:10px;
  height:10px;
  background-color:red;
  opacity:0.8;
  z-index:0;
  animation:fall 3s linear forwards;
}
@keyframes fall{
  0% {transform:translateY(0) rotate(0deg);}
  100% {transform:translateY(100vh) rotate(720deg); opacity:0;}
}
</style>
</head>
<body>

<audio id="partyMusic" src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" autoplay loop></audio>

<div id="floatingText"></div>
<div id="wrapper">
<button id="openGiftsBtn">Open Your Birthday Gift 🎁</button>

<div id="giftsPage" style="display:none;">
<h2>Choose Only One Gift</h2>
<div class="gifts">
<div class="gift" data-gift="1">🎁</div>
<div class="gift" data-gift="2">🎁</div>
<div class="gift" data-gift="3">🎁</div>
</div>
</div>
</div>

<div id="popup">
<div class="content" id="giftContent"></div>
</div>

<script src="https://tenor.com/embed.js" async></script>
<script>
// Letter-by-letter animation
const text="HAPPY  BIRTHDAY  MAYEESHA  🎂 ❤️";
const container=document.getElementById("floatingText");
let delay=0;
text.split("").forEach(char=>{
  const span=document.createElement("span");
  span.textContent=char;
  span.className="letter";
  span.style.animationDelay=delay+"s";
  container.appendChild(span);
  delay+=0.15;
});

// Floating hearts
setInterval(()=>{
  const h = document.createElement("div");
  h.className="heart";
  h.style.left=Math.random()*100+"vw";
  h.textContent="❤️";
  document.body.appendChild(h);
  setTimeout(()=>h.remove(),6000);
},500);

// Emoji balloons
const balloonEmojis=["🎈","🎉","🎊","🎁"];
setInterval(()=>{
  const b = document.createElement("div");
  b.className="emojiBalloon";
  b.style.left=Math.random()*100+"vw";
  b.style.fontSize=(20+Math.random()*30)+"px";
  b.textContent = balloonEmojis[Math.floor(Math.random()*balloonEmojis.length)];
  b.style.animationDuration=(4+Math.random()*4)+"s";
  document.body.appendChild(b);
  setTimeout(()=>b.remove(),8000);
},700);

// Sparkles
setInterval(()=>{
  const s=document.createElement("div");
  s.className="sparkle";
  s.style.left=Math.random()*100+"vw";
  s.style.background=["#fff","#ffd700","#ff69b4"][Math.floor(Math.random()*3)];
  document.body.appendChild(s);
  setTimeout(()=>s.remove(),4000);
},700);

// Confetti
setInterval(()=>{
  const c = document.createElement("div");
  c.className="confetti-piece";
  c.style.left=Math.random()*100+"vw";
  c.style.backgroundColor=`hsl(${Math.random()*360},100%,50%)`;
  c.style.width=(5+Math.random()*10)+"px";
  c.style.height=(5+Math.random()*10)+"px";
  c.style.animationDuration=(2+Math.random()*2)+"s";
  document.body.appendChild(c);
  setTimeout(()=>c.remove(),3000);
},200);

// Gift system
let chosen=false;
document.getElementById("openGiftsBtn").onclick = function(){
  document.getElementById("giftsPage").style.display="block";
};

document.querySelectorAll(".gift").forEach(item=>{
  item.onclick=function(){
    if(chosen){
      alert("You can choose only ONE gift ❤️");
      return;
    }
    chosen=true;
    const giftNum=this.dataset.gift;
    const popup=document.getElementById("popup");
    const content=document.getElementById("giftContent");
    popup.style.display="flex";

    if(giftNum==1){
      content.innerHTML=`
      <h3>🌸 Flowers For You</h3>
      <div class="tenor-gif-embed" data-postid="15115009436133024653" data-share-method="host" data-aspect-ratio="1.18" data-width="100%">
        <a href="https://tenor.com/view/dudu-giving-flowers-bubu-flowers-cute-sweet-i-love-you-gif-15115009436133024653">Dudu Giving Flowers Bubu Cute Sweet Sticker</a> from 
        <a href="https://tenor.com/search/dudu+giving+flowers+bubu-stickers">Dudu Giving Flowers Bubu Stickers</a>
      </div>
      <br><br>
      <button onclick="closePop()">Close</button>`;
      loadTenorEmbed();
    }
    if(giftNum==2){
      content.innerHTML=`<h3>💌 Special Message</h3>
      <p>Mayeesha, you are the brightest star in my life. 🌟<br>Always keep smiling and shining. Happy Birthday my love! ❤️</p>
      <button onclick="closePop()">Close</button>`;
    }
    if(giftNum==3){
      content.innerHTML=`
      <h3>🎁 Surprise Sticker</h3>
      <div class="tenor-gif-embed" data-postid="9701705563009101712" data-share-method="host" data-aspect-ratio="1.566" data-width="100%">
        <a href="https://tenor.com/view/dudu-rose-bubu-dudu-gift-happy-birthday-bubu-bubu-birthday-dudu-surprise-gif-9701705563009101712">Dudu Rose Bubu Dudu Gift Sticker</a> from 
        <a href="https://tenor.com/search/dudu+rose-stickers">Dudu Rose Stickers</a>
      </div>
      <br><br>
      <button onclick="closePop()">Close</button>`;
      loadTenorEmbed();
    }
  };
});

function closePop(){
  document.getElementById("popup").style.display="none";
}

// Reload Tenor embed
function loadTenorEmbed(){
  const oldScript=document.getElementById("tenorScriptDynamic");
  if(oldScript) oldScript.remove();
  const script=document.createElement("script");
  script.id="tenorScriptDynamic";
  script.src="https://tenor.com/embed.js";
  script.async=true;
  document.body.appendChild(script);
}
</script>
</body>
</html>
